<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Tester</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h3>Lets Beat Speed</h3>

    <div id="paragraph">
      The quick brown fox jumps over the lazy dog
    </div>

    <textarea id="input" placeholder="Start typing here..." disabled></textarea>

    <div class="button-group">
      <button id="startBtn" class="btn-primary">Start Test</button>
      <button id="finishBtn" class="btn-danger" disabled>Finish Test</button>
      <button id="resetBtn" class="btn-secondary">Reset</button>
    </div>

    <div class="stats">
      <div class="stat-item">
        <label>Time:</label>
        <span id="time">0</span><span class="unit">s</span>
      </div>
      <div class="stat-item">
        <label>WPM:</label>
        <span id="wpm">0</span><span class="unit">wpm</span>
      </div>
      <div class="stat-item">
        <label>Accuracy:</label>
        <span id="accuracy">0</span><span class="unit">%</span>
      </div>
      <div class="stat-item">
        <label>Mistakes:</label>
        <span id="mistakes">0</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
